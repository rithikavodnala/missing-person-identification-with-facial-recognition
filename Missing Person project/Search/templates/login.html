<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Police Officer Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0e0a, #1a2e1a, #0f1f0f);
      overflow: hidden;
      perspective: 1000px;
    }

    .background-animation {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; opacity: 0.3;
    }

    .background-animation::before,
    .background-animation::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 255, 0, 0.5), transparent);
      animation: float 20s infinite;
    }

    .background-animation::before { top: -100px; left: -100px; animation-delay: 0s; }
    .background-animation::after { bottom: -100px; right: -100px; animation-delay: 10s; }

    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(100px,-100px) scale(1.2); }
      50% { transform: translate(200px,100px) scale(0.8); }
      75% { transform: translate(-100px,50px) scale(1.1); }
    }

    .scan-line {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, #00ff00, transparent);
      box-shadow: 0 0 20px #00ff00;
      animation: scan 4s linear infinite;
      z-index: 1;
    }

    @keyframes scan {
      0% { top: 0; } 100% { top: 100%; }
    }

    .login-container {
      position: relative; z-index: 1;
      width: 420px; padding: 50px 40px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 2px solid #00ff00;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5),
                  0 0 50px rgba(0, 255, 0, 0.3),
                  inset 0 0 30px rgba(0, 255, 0, 0.05);
      animation: slideIn 0.8s ease-out;
      transition: transform 0.3s ease;
    }

    .login-container:hover {
      transform: translateZ(20px);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6),
                  0 0 70px rgba(0, 255, 0, 0.5),
                  inset 0 0 40px rgba(0, 255, 0, 0.08);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-50px) rotateX(-20deg); }
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    .badge-icon {
      width: 80px; height: 80px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(0, 200, 0, 0.3));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #00ff00;
      box-shadow: 0 10px 30px rgba(0, 255, 0, 0.5), inset 0 0 20px rgba(0, 255, 0, 0.2);
      animation: rotate3d 4s infinite ease-in-out;
    }

    @keyframes rotate3d {
      0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
      50% { transform: rotateY(180deg) rotateX(10deg); }
    }

    .badge-icon::before {
      content: '★';
      font-size: 40px;
      color: #00ff00;
      text-shadow: 0 0 20px rgba(0,255,0,1), 0 0 40px rgba(0,255,0,0.8);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    h2 {
      text-align: center; color: #00ff00;
      font-size: 28px; font-weight: 600;
      margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,0,0.8), 0 0 40px rgba(0,255,0,0.5);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 20px rgba(0,255,0,0.8), 0 0 40px rgba(0,255,0,0.5);
      }
      50% {
        text-shadow: 0 0 30px rgba(0,255,0,1), 0 0 60px rgba(0,255,0,0.7);
      }
    }

    .input-group { margin-bottom: 30px; }
    label {
      display: block; color: #00ff00;
      font-size: 14px; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0,255,0,0.5);
    }

    input {
      width: 100%; padding: 15px 20px;
      background: rgba(0,255,0,0.05);
      border: 2px solid rgba(0,255,0,0.3);
      border-radius: 10px; color: #00ff00;
      font-size: 16px; outline: none; transition: all 0.3s ease;
    }

    input:focus {
      background: rgba(0,255,0,0.1);
      border-color: #00ff00;
      box-shadow: 0 0 20px rgba(0,255,0,0.5), inset 0 0 10px rgba(0,255,0,0.1);
    }

    input::placeholder { color: rgba(0,255,0,0.4); }

    button {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,200,0,0.3));
      border: 2px solid #00ff00;
      border-radius: 10px; color: #00ff00;
      font-size: 16px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer; transition: all 0.3s ease;
      margin-top: 20px;
      box-shadow: 0 10px 25px rgba(0,255,0,0.3);
    }

    button:hover {
      background: linear-gradient(135deg, rgba(0,255,0,0.3), rgba(0,200,0,0.4));
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(0,255,0,0.5);
    }

    .error {
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid rgba(255, 0, 0, 0.5);
      color: #ff3333;
      padding: 12px; border-radius: 8px;
      margin-top: 20px; text-align: center;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(255,51,51,0.8);
    }

    .info-text {
      text-align: center; color: rgba(0,255,0,0.6);
      font-size: 12px; margin-top: 20px;
      text-shadow: 0 0 5px rgba(0,255,0,0.3);
    }

    @media (max-width: 480px) {
      .login-container { width: 90%; padding: 40px 30px; }
      h2 { font-size: 24px; }
    }
  </style>
</head>

<body>
  <div class="background-animation"></div>
  <div class="scan-line"></div>

  <div class="login-container">
    <div class="badge-icon"></div>
    <h2>Officer Login</h2>

    <!-- ✅ Flask-connected form -->
    <form method="POST" action="/">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your badge ID" required />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <button type="submit">Access System</button>
    </form>

    <!-- ✅ Flask flash message -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="error">
          {% for msg in messages %}
            {{ msg }}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <p class="info-text">Authorized Personnel Only</p>
  </div>
</body>
</html>
