<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missing Person Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0e0a, #1a2e1a, #0f1f0f);
      color: #00ff00;
      perspective: 1000px;
      overflow-x: hidden;
    }

    .background-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 0, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
      opacity: 0.3;
    }

    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ff00, transparent);
      box-shadow: 0 0 20px #00ff00;
      animation: scan 4s linear infinite;
      z-index: 1;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    header {
      position: relative;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 25px 40px;
      border-bottom: 2px solid #00ff00;
      box-shadow: 0 5px 30px rgba(0, 255, 0, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: headerSlide 0.8s ease-out;
    }

    @keyframes headerSlide {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% {
        text-shadow: 0 0 20px rgba(0,255,0,0.8),0 0 40px rgba(0,255,0,0.5);
      }
      50% {
        text-shadow: 0 0 30px rgba(0,255,0,1),0 0 60px rgba(0,255,0,0.7);
      }
    }

    .logout {
      padding: 12px 30px;
      background: rgba(0,255,0,0.1);
      border: 2px solid #00ff00;
      border-radius: 8px;
      color: #00ff00;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .logout::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(0,255,0,0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .logout:hover::before { width: 300px; height: 300px; }

    .logout:hover {
      background: rgba(0,255,0,0.2);
      box-shadow: 0 0 30px rgba(0,255,0,0.5);
      transform: translateY(-2px);
    }

    .form-container {
      position: relative;
      z-index: 10;
      max-width: 700px;
      margin: 60px auto;
      padding: 50px 40px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      border: 2px solid #00ff00;
      border-radius: 20px;
      box-shadow: 0 0 50px rgba(0,255,0,0.3), inset 0 0 30px rgba(0,255,0,0.05);
      transform-style: preserve-3d;
      animation: formAppear 1s ease-out;
    }

    @keyframes formAppear {
      from { opacity: 0; transform: translateY(50px) rotateX(-20deg); }
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    form { display: flex; flex-direction: column; gap: 25px; }

    label {
      color: #00ff00;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0,255,0,0.5);
    }

    input[type="file"] {
      padding: 15px;
      background: rgba(0,255,0,0.05);
      border: 2px solid rgba(0,255,0,0.3);
      border-radius: 10px;
      color: #00ff00;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input[type="file"]:hover {
      background: rgba(0,255,0,0.1);
      border-color: #00ff00;
      box-shadow: 0 0 20px rgba(0,255,0,0.3);
    }

    input[type="file"]::file-selector-button {
      padding: 10px 20px;
      background: rgba(0,255,0,0.2);
      border: 1px solid #00ff00;
      border-radius: 6px;
      color: #00ff00;
      font-weight: 600;
      cursor: pointer;
      margin-right: 15px;
      transition: all 0.3s ease;
    }

    input[type="file"]::file-selector-button:hover {
      background: rgba(0,255,0,0.3);
      box-shadow: 0 0 15px rgba(0,255,0,0.5);
    }

    button {
      padding: 18px;
      background: linear-gradient(135deg, rgba(0,255,0,0.2), rgba(0,200,0,0.3));
      border: 2px solid #00ff00;
      border-radius: 10px;
      color: #00ff00;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,0,0.3), transparent);
      transition: left 0.5s;
    }

    button:hover::before { left: 100%; }
    button:hover {
      background: linear-gradient(135deg, rgba(0,255,0,0.3), rgba(0,200,0,0.4));
      box-shadow: 0 0 40px rgba(0,255,0,0.6);
      transform: translateY(-3px);
    }

    #loading {
      margin-top: 25px;
      padding: 20px;
      background: rgba(255,255,0,0.1);
      border: 2px solid #ffff00;
      border-radius: 10px;
      color: #ffff00;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 20px rgba(255,255,0,0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 40px rgba(255,255,0,0.8); }
    }

    .result-box {
      margin-top: 40px;
      padding: 30px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #00ff00;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,255,0,0.4);
      animation: resultAppear 0.6s ease-out;
    }

    @keyframes resultAppear {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .result-box h3 {
      font-size: 24px;
      margin-bottom: 15px;
      text-shadow: 0 0 15px rgba(0,255,0,0.8);
    }

    .result-box p { font-size: 16px; margin-bottom: 20px; color: #00ff00; }

    .result-box img {
      width: 100%;
      max-width: 320px;
      border: 2px solid #00ff00;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,255,0,0.5);
      display: block;
      margin: 20px auto 0;
    }

    .error { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.8); }

    @media (max-width: 768px) {
      header { flex-direction: column; gap: 15px; text-align: center; }
      h1 { font-size: 24px; }
      .form-container { margin: 30px 20px; padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="background-grid"></div>
  <div class="scan-line"></div>

  <header>
    <h1>Missing Person Search System</h1>
    <a href="#" class="logout" onclick="handleLogout(event)">Logout</a>
  </header>

  <section class="form-container">
    <form id="searchForm" method="POST" enctype="multipart/form-data" action="/search">
      <label>Upload Person Image:</label>
      <input type="file" name="person_image" accept="image/*" required>

      <label>Upload Video File:</label>
      <input type="file" name="video_file" accept="video/*" required>

      <button type="submit">Search in Video</button>
    </form>

    <div id="loading" style="display:none;">
      ⏳ Please wait, processing video... this might take a while.
    </div>

    <div id="resultContainer"></div>
  </section>

  <script>
    const form = document.getElementById("searchForm");
    const loading = document.getElementById("loading");
    const resultContainer = document.getElementById("resultContainer");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      loading.style.display = "block";
      resultContainer.innerHTML = "";

      const formData = new FormData(form);

      try {
        const response = await fetch("/search", {
          method: "POST",
          body: formData
        });
        const data = await response.json();
        loading.style.display = "none";

        if (data.error) {
          resultContainer.innerHTML = `
            <div class="result-box error">
              <h3>❌ Error:</h3>
              <p>${data.error}</p>
            </div>`;
        } else if (data.found) {
          resultContainer.innerHTML = `
            <div class="result-box">
              <h3>✅ Person Found!</h3>
              <p>Timestamp: ${data.timestamp}</p>
              ${data.snapshot ? `<img src="${data.snapshot}" alt="Snapshot" />` : ""}
              <p>📩 Email alerts sent to police authorities.</p>
            </div>`;
        } else {
          resultContainer.innerHTML = `
            <div class="result-box">
              <h3>❌ Person Not Found in Video</h3>
            </div>`;
        }
      } catch (err) {
        loading.style.display = "none";
        resultContainer.innerHTML = `
          <div class="result-box error">
            <h3>❌ Network Error:</h3>
            <p>${err}</p>
          </div>`;
      }
    });

    function handleLogout(e) {
      e.preventDefault();
      if (confirm("Are you sure you want to logout?")) {
        window.location.href = "/logout";
      }
    }
  </script>
</body>
</html>
